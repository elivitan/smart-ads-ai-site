<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Bamzal mark — 8-pointed Mazel Star on deep ink background -->
  <rect width="1024" height="1024" rx="224" fill="url(#bg)"/>

  <!-- Outer sparkle -->
  <g transform="translate(512 512)">
    <path d="M0 -340 L72 -120 L300 -60 L120 60 L60 300 L0 340 L-60 300 L-120 60 L-300 -60 L-120 -120 Z"
          fill="url(#starGrad)"/>
    <!-- Cleaner 8-point star (corrected geometry) -->
  </g>

  <!-- Re-drawn proper 8-point sparkle -->
  <g transform="translate(512 512)" opacity="0">
    <path d="" />
  </g>

  <!-- True 8-point sparkle (AI star), centered -->
  <g transform="translate(512 512)">
    <path d="
      M 0 -360
      C 30 -160 160 -30 360 0
      C 160 30 30 160 0 360
      C -30 160 -160 30 -360 0
      C -160 -30 -30 -160 0 -360 Z"
      fill="url(#starGrad)"/>
    <!-- inner highlight -->
    <path d="
      M 0 -200
      C 18 -90 90 -18 200 0
      C 90 18 18 90 0 200
      C -18 90 -90 18 -200 0
      C -90 -18 -18 -90 0 -200 Z"
      fill="white" opacity="0.28"/>
    <!-- center bright dot -->
    <circle r="36" fill="white" opacity="0.85"/>
  </g>

  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F0F23"/>
      <stop offset="100%" stop-color="#1E1B4B"/>
    </linearGradient>
    <linearGradient id="starGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A78BFA"/>
      <stop offset="55%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#22D3EE"/>
    </linearGradient>
  </defs>
</svg>

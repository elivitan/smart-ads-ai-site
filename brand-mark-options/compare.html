<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bamzal Mark Options</title>
  <style>
    body{margin:0;background:#f7f3e9;color:#0a0a0f;font-family:Inter,Arial,sans-serif}
    main{max-width:1120px;margin:0 auto;padding:48px 24px}
    h1{font-size:28px;margin:0 0 28px}
    .grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:24px}
    .card{background:#fff;border:1px solid #e4dcc8;border-radius:18px;padding:24px;text-align:center}
    .card img{width:100%;max-width:180px;display:block;margin:0 auto 18px}
    .name{font-size:14px;font-weight:700;letter-spacing:.04em;text-transform:uppercase}
    .tiny{display:flex;align-items:center;justify-content:center;gap:10px;margin-top:18px}
    .tiny img{width:32px;height:32px;margin:0}
    @media(max-width:800px){.grid{grid-template-columns:repeat(2,minmax(0,1fr))}}
  </style>
</head>
<body>
  <main>
    <h1>Bamzal mark options: A / D / E / H family</h1>
    <div class="grid">
      <div class="card"><img src="a-prism.svg" alt="A prism"><div class="name">A Prism</div><div class="tiny"><img src="a-prism.svg" alt="">16-32px test</div></div>
      <div class="card"><img src="d-lift.svg" alt="D lift"><div class="name">D Lift</div><div class="tiny"><img src="d-lift.svg" alt="">16-32px test</div></div>
      <div class="card"><img src="e-gateway.svg" alt="E gateway"><div class="name">E Gateway</div><div class="tiny"><img src="e-gateway.svg" alt="">16-32px test</div></div>
      <div class="card"><img src="h-signal.svg" alt="H signal"><div class="name">H Signal</div><div class="tiny"><img src="h-signal.svg" alt="">16-32px test</div></div>
    </div>
  </main>
</body>
</html>

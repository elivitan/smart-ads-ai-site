<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Smart Ads AI</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><circle cx='16' cy='16' r='16' fill='%236c5ce7'/><path d='M18 4L10 18h5l-1 10 8-14h-5z' fill='white'/></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300..800;1,9..40,300..800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', system-ui, sans-serif; background: #050510; color: #e8e8f0; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .login-box { width: 100%; max-width: 420px; padding: 24px; }
    .login-logo { text-align: center; margin-bottom: 40px; }
    .login-logo a { font-size: 24px; font-weight: 800; color: #fff; text-decoration: none; }
    .login-logo em { font-style: normal; color: #818cf8; }
    .login-card { background: #0f0f24; border: 1px solid rgba(255,255,255,.08); border-radius: 20px; padding: 40px 32px; }
    .login-card h1 { font-size: 22px; font-weight: 800; margin-bottom: 6px; text-align: center; }
    .login-card .sub { font-size: 14px; color: rgba(255,255,255,.5); text-align: center; margin-bottom: 28px; }
    .field { margin-bottom: 18px; }
    .field label { display: block; font-size: 13px; font-weight: 600; color: rgba(255,255,255,.6); margin-bottom: 6px; }
    .field input { width: 100%; padding: 12px 16px; background: #171733; border: 1px solid rgba(255,255,255,.1); border-radius: 10px; color: #fff; font-size: 15px; font-family: inherit; outline: none; transition: border-color .2s; }
    .field input:focus { border-color: #6366f1; }
    .field input::placeholder { color: rgba(255,255,255,.25); }
    .login-btn { width: 100%; padding: 14px; background: linear-gradient(135deg, #6366f1, #8b5cf6); color: #fff; border: none; border-radius: 12px; font-size: 15px; font-weight: 700; cursor: pointer; font-family: inherit; transition: all .2s; margin-top: 8px; }
    .login-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 20px rgba(99,102,241,.3); }
    .divider { display: flex; align-items: center; gap: 12px; margin: 24px 0; }
    .divider span { font-size: 12px; color: rgba(255,255,255,.3); white-space: nowrap; }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: rgba(255,255,255,.08); }
    .shopify-btn { width: 100%; padding: 13px; background: #96bf48; color: #fff; border: none; border-radius: 12px; font-size: 14px; font-weight: 700; cursor: pointer; font-family: inherit; display: flex; align-items: center; justify-content: center; gap: 8px; transition: all .2s; }
    .shopify-btn:hover { background: #7ea83e; }
    .login-footer { text-align: center; margin-top: 24px; font-size: 13px; color: rgba(255,255,255,.4); }
    .login-footer a { color: #818cf8; }
    .notice { background: rgba(99,102,241,.08); border: 1px solid rgba(99,102,241,.15); border-radius: 10px; padding: 12px 16px; margin-top: 20px; font-size: 12px; color: rgba(255,255,255,.5); text-align: center; line-height: 1.6; }
  </style>
</head>
<body>
  <div class="login-box">
    <div class="login-logo"><a href="/">Smart Ads <em>AI</em></a></div>
    <div class="login-card">
      <h1>Welcome back</h1>
      <p class="sub">Sign in to manage your campaigns</p>
      <div class="field">
        <label>Email</label>
        <input type="email" placeholder="you@yourstore.com">
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" placeholder="Enter your password">
      </div>
      <button class="login-btn" onclick="document.querySelector('.notice').style.display='block'">Sign In</button>
      <div class="divider"><span>or continue with</span></div>
      <button class="shopify-btn" onclick="document.querySelector('.notice').style.display='block'">&#x1F6D2; Sign in with Shopify</button>
      <div class="notice" style="display:none">
        Smart Ads AI is available as a Shopify embedded app. To access the dashboard, install the app from your Shopify admin panel. For early access, contact <a href="mailto:support@smart-ad-sai.com">support@smart-ad-sai.com</a>
      </div>
    </div>
    <div class="login-footer">
      <a href="/">Back to homepage</a> &bull; <a href="/privacy.html">Privacy</a> &bull; <a href="/terms.html">Terms</a>
    </div>
  </div>
</body>
</html>
